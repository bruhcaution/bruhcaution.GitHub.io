<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Aural</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Aural">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
</head>
<body>
    <div class="player-container">
        <header>
            <h1>Aural</h1>
            <label for="audio-upload" class="upload-btn">Load Music</label>
            <input type="file" id="audio-upload" accept=".mp3, .flac, .m4a" multiple>
        </header>

        <div class="now-playing">
            <div class="album-art" id="album-art-container">
                <div class="art-placeholder" id="art-placeholder">🎵</div>
            </div>
            <h2 id="track-name">No track selected</h2>
            <p id="artist-name">Offline Mode Ready</p>
        </div>

        <div class="controls">
            <input type="range" id="seek-bar" value="0" max="100">
            <div class="time-display">
                <span id="current-time">0:00</span>
                <span id="duration">0:00</span>
            </div>
            <div class="transport">
                <button id="shuffle-btn">🔀</button>
                <button id="prev-btn">⏮</button>
                <button id="play-pause-btn" class="play-btn">▶</button>
                <button id="next-btn">⏭</button>
                <button id="queue-btn">☰</button>
            </div>
            <div class="volume-control">
                <span>🔈</span>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.8">
            </div>
        </div>

        <div class="eq-section">
            <h3>10-Band Equalizer</h3>
            <div class="eq-sliders" id="eq-sliders"></div>
        </div>
    </div>
    
    <audio id="audio-element"></audio>
    <script src="app.js"></script>
</body>
</html>
